<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Progetto Fluffy-Test</title>
    <style>
        :root {
            --primary: #00f2ff;
            --secondary: #0062ff;
            --bg: #0f172a;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            /* Sfondo con fallback a gradiente se sfondo.jpg manca */
            background: url('sfondo.jpg') no-repeat center center fixed, 
                        radial-gradient(circle, #1e293b 0%, #0f172a 100%);
            background-size: cover;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .header { text-align: center; margin-bottom: 30px; z-index: 10; }
        h1 { font-size: 2.2rem; text-transform: uppercase; letter-spacing: 4px; margin: 0; color: var(--primary); text-shadow: 0 0 15px rgba(0, 242, 255, 0.7); }
        p { font-size: 1.1rem; color: #94a3b8; margin-top: 5px; text-transform: lowercase; }

        .wheel-container {
            position: relative;
            width: 85vw;
            max-width: 500px;
            aspect-ratio: 1/1;
        }

        .neon-border {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            border-radius: 50%;
            border: 4px solid var(--primary);
            box-shadow: 0 0 25px var(--primary), inset 0 0 15px var(--primary);
            z-index: 1;
            pointer-events: none;
        }

        #canvas {
            width: 100%; height: 100%;
            border-radius: 50%;
            z-index: 2;
            transition: transform 5s cubic-bezier(0.15, 0, 0.15, 1);
        }

        .pointer {
            position: absolute;
            top: -20px; left: 50%;
            transform: translateX(-50%);
            width: 0; height: 0;
            border-left: 20px solid transparent;
            border-right: 20px solid transparent;
            border-top: 40px solid #ff4757;
            z-index: 100;
            filter: drop-shadow(0 0 10px #ff4757);
        }

        #spin-btn {
            margin-top: 40px;
            padding: 15px 45px;
            font-size: 1.2rem;
            font-weight: 900;
            color: white;
            background: linear-gradient(135deg, var(--secondary), var(--primary));
            border: none;
            border-radius: 12px;
            cursor: pointer;
            text-transform: uppercase;
            box-shadow: 0 10px 25px rgba(0, 98, 255, 0.4);
            transition: 0.3s;
            z-index: 10;
        }

        #spin-btn:disabled { opacity: 0.5; cursor: not-allowed; }

        /* Overlay Quiz e Risultato */
        #quiz-overlay, #result-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(10, 15, 30, 0.98);
            z-index: 2000;
            justify-content: center; align-items: center;
        }

        .quiz-card {
            background: #1e293b;
            padding: 30px;
            border-radius: 20px;
            border: 2px solid var(--primary);
            max-width: 450px; width: 90%;
            text-align: center;
        }

        .ans-btn {
            display: block; width: 100%; padding: 15px;
            margin: 10px 0; background: rgba(255,255,255,0.05);
            color: white; border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px; cursor: pointer;
            transition: 0.2s;
            text-transform: uppercase;
            font-weight: bold;
        }
        .ans-btn:hover { background: var(--secondary); }
    </style>
</head>
<body>

    <audio id="spin-sound" src="musica.mp3" preload="auto"></audio>

    <div class="header">
        <h1>Progetto Fluffy-Test</h1>
        <p>supera l'esame o torna a studiare!</p>
    </div>
    
    <div class="wheel-container">
        <div class="pointer"></div>
        <div class="neon-border"></div>
        <canvas id="canvas" width="800" height="800"></canvas>
    </div>

    <button id="spin-btn">GIRA LA RUOTA</button>

    <div id="quiz-overlay">
        <div class="quiz-card">
            <h2 style="color: var(--primary);">SESSIONE D'ESAME</h2>
            <p id="question-text" style="font-size: 1.2rem; margin: 20px 0;"></p>
            <div id="options"></div>
        </div>
    </div>

    <div id="result-overlay">
        <div class="quiz-card">
            <h2 id="result-title" style="font-size: 2rem;"></h2>
            <p id="result-text" style="margin: 20px 0; font-size: 1.1rem;"></p>
            <button onclick="location.reload()" class="ans-btn" style="background: var(--primary); color: #0f172a;">Riprova</button>
        </div>
    </div>

    <script>
        const sectors = [
            { label: "MECCANICO", color: "#e63946", questions: [
                { q: "Cos'è il numero di Reynolds?", a: ["Un indice di viscosità", "Rapporto tra forze d'inerzia e viscose", "La velocità critica"], c: 1 },
                { q: "Il Ciclo di Carnot è:", a: ["Un motore diesel", "Un ciclo teorico ideale", "Un software CAD"], c: 1 },
                { q: "Cosa descrive la legge di Hooke?", a: ["Deformazione plastica", "Proporzionalità tra sforzo e deformazione", "Viscosità"], c: 1 }
            ]},
            { label: "INFORMATICO", color: "#2a9d8f", questions: [
                { q: "Cosa significa CPU?", a: ["Central Processing Unit", "Computer Personal User", "Core Process Unit"], c: 0 },
                { q: "Quale linguaggio è 'Low Level'?", a: ["Python", "Assembly", "Java"], c: 1 },
                { q: "Complessità di inserimento in Hash Table?", a: ["O(n)", "O(log n)", "O(1)"], c: 2 }
            ]},
            { label: "CIVILE", color: "#457b9d", questions: [
                { q: "Il Modulo di Young misura:", a: ["La plasticità", "L'elasticità longitudinale", "La durezza"], c: 1 },
                { q: "Una trave appoggiata-appoggiata è:", a: ["Iperstatica", "Isostatica", "Labile"], c: 1 }
            ]},
            { label: "ELETTRONICO", color: "#f4a261", questions: [
                { q: "La legge di Ohm è:", a: ["V = R/I", "V = R*I", "P = V/I"], c: 1 },
                { q: "Cosa fa un diodo?", a: ["Amplifica", "Corrente in un solo senso", "Accumula carica"], c: 1 }
            ]},
            { label: "AEROSPAZIALE", color: "#8338ec", questions: [
                { q: "La portanza dipende da:", a: ["Solo il peso", "Differenza pressione dorso/ventre", "Magnetismo"], c: 1 },
                { q: "Velocità di fuga dalla Terra?", a: ["7.9 km/s", "11.2 km/s", "300.000 km/s"], c: 1 }
            ]}
        ];

        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const spinBtn = document.getElementById('spin-btn');
        const spinSound = document.getElementById('spin-sound');
        let currentRotation = 0;

        function draw() {
            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;
            const radius = canvas.width / 2;
            const arc = (2 * Math.PI) / sectors.length;

            sectors.forEach((s, i) => {
                const angle = i * arc;
                ctx.beginPath();
                ctx.fillStyle = s.color;
                ctx.moveTo(centerX, centerY);
                ctx.arc(centerX, centerY, radius, angle, angle + arc);
                ctx.lineTo(centerX, centerY);
                ctx.fill();
                
                ctx.save();
                ctx.translate(centerX, centerY);
                ctx.rotate(angle + arc / 2);
                ctx.textAlign = "right";
                ctx.fillStyle = "white";
                ctx.font = "bold 35px Arial";
                ctx.fillText(s.label, radius - 30, 10);
                ctx.restore();
            });
        }

        draw();

        spinBtn.onclick = () => {
            spinBtn.disabled = true;
            
            // Audio Play
            if (spinSound) {
                spinSound.currentTime = 0;
                spinSound.play().catch(() => console.log("Audio non caricato"));
            }

            const extraDeg = 1800 + Math.floor(Math.random() * 1800);
            currentRotation += extraDeg;
            canvas.style.transform = `rotate(${currentRotation}deg)`;
            
            setTimeout(() => {
                if (spinSound) spinSound.pause();
                const actualDeg = (currentRotation % 360);
                const sectorAngle = 360 / sectors.length;
                const idx = Math.floor(((360 - actualDeg + 270) % 360) / sectorAngle);
                showQuiz(idx);
            }, 5000);
        };

        function showQuiz(idx) {
            const disc = sectors[idx];
            const qObj = disc.questions[Math.floor(Math.random() * disc.questions.length)];
            const overlay = document.getElementById('quiz-overlay');
            const optDiv = document.getElementById('options');
            
            overlay.style.display = 'flex';
            document.getElementById('question-text').innerHTML = `Hai puntato: <b style="color:${disc.color}">${disc.label}</b><br><br>${qObj.q}`;
            
            optDiv.innerHTML = '';
            qObj.a.forEach((ans, i) => {
                const btn = document.createElement('button');
                btn.className = 'ans-btn';
                btn.innerText = ans;
                btn.onclick = () => {
                    overlay.style.display = 'none';
                    const resOverlay = document.getElementById('result-overlay');
                    const resTitle = document.getElementById('result-title');
                    const resText = document.getElementById('result-text');
                    
                    resOverlay.style.display = 'flex';

                    if (i === qObj.c) {
                        resTitle.innerText = "ECCELLENTE!";
                        resTitle.style.color = "var(--primary)";
                        resText.innerText = "Esame superato. Sei ufficialmente un Ingegnere.";
                    } else {
                        resTitle.innerText = "BOCCIATO!";
                        resTitle.style.color = "#ff4757";
                        resText.innerText = "Risposta errata. TORNA A STUDIARE!";
                    }
                };
                optDiv.appendChild(btn);
            });
        }
    </script>
</body>
</html>
