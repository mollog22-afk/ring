<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ingegneria Wheel</title>
    <style>
        :root {
            --primary: #00f2ff;
            --secondary: #0062ff;
            --bg: #0f172a;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: #0f172a; /* Rimosso url temporaneamente per test */
            background-size: cover;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.85);
            z-index: -1;
        }

        .header { text-align: center; margin-bottom: 30px; z-index: 10; }
        h1 { font-size: 2.2rem; text-transform: uppercase; letter-spacing: 4px; margin: 0; color: var(--primary); text-shadow: 0 0 15px rgba(0, 242, 255, 0.7); }
        p { font-size: 1.1rem; color: #94a3b8; margin-top: 5px; text-transform: lowercase; }

        .wheel-container {
            position: relative;
            width: 85vw;
            max-width: 500px;
            aspect-ratio: 1/1;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .neon-border {
            position: absolute;
            width: 100%; height: 100%;
            border-radius: 50%;
            border: 4px solid var(--primary);
            box-shadow: 0 0 25px var(--primary), inset 0 0 15px var(--primary);
            z-index: 1;
            pointer-events: none;
        }

        #canvas {
            width: 96%; height: 96%;
            border-radius: 50%;
            z-index: 2;
            transition: transform 5s cubic-bezier(0.15, 0, 0.15, 1);
        }

        .pointer {
            position: absolute;
            top: -20px; left: 50%;
            transform: translateX(-50%);
            width: 0; height: 0;
            border-left: 20px solid transparent;
            border-right: 20px solid transparent;
            border-top: 40px solid #ff4757;
            z-index: 100;
            filter: drop-shadow(0 0 10px #ff4757);
        }

        #spin-btn {
            margin-top: 40px;
            padding: 15px 45px;
            font-size: 1.2rem;
            font-weight: 900;
            color: white;
            background: linear-gradient(135deg, var(--secondary), var(--primary));
            border: none;
            border-radius: 12px;
            cursor: pointer;
            text-transform: uppercase;
            box-shadow: 0 10px 25px rgba(0, 98, 255, 0.4);
            transition: 0.3s;
            z-index: 10;
        }

        #quiz-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(10, 15, 30, 0.98);
            z-index: 2000;
            justify-content: center; align-items: center;
        }

        .quiz-card {
            background: #1e293b;
            padding: 30px;
            border-radius: 20px;
            border: 2px solid var(--primary);
            max-width: 400px; width: 90%;
            text-align: center;
        }

        .ans-btn {
            display: block; width: 100%; padding: 15px;
            margin: 10px 0; background: rgba(255,255,255,0.05);
            color: white; border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px; cursor: pointer;
        }
    </style>
</head>
<body>

    <audio id="spin-sound" src="WhatsApp Audio 2026-03-08 at 20.15.00 (mp3cut.net).mp3"></audio>

    <div class="header">
        <h1>Ingegneria Wheel</h1>
        <p>supera l'esame o torna a studiare!</p>
    </div>
    
    <div class="wheel-container">
        <div class="pointer"></div>
        <div class="neon-border"></div>
        <canvas id="canvas" width="800" height="800"></canvas>
    </div>

    <button id="spin-btn">Avvia Protocollo</button>

    <div id="quiz-overlay">
        <div class="quiz-card">
            <h2 style="color: var(--primary);">SESSIONE D'ESAME</h2>
            <p id="question-text" style="font-size: 1.2rem; margin: 20px 0;"></p>
            <div id="options"></div>
        </div>
    </div>

    <script>
        const sectors = [
            { label: "MECCANICO", color: "#e63946", questions: [
                { q: "Cos'è il numero di Reynolds?", a: ["Un indice di viscosità", "Rapporto tra forze d'inerzia e viscose", "La velocità critica"], c: 1 },
                { q: "Il Ciclo di Carnot è:", a: ["Un motore diesel", "Un ciclo teorico ideale", "Un software CAD"], c: 1 }
            ]},
            { label: "INFORMATICO", color: "#2a9d8f", questions: [
                { q: "Cosa significa CPU?", a: ["Central Processing Unit", "Computer Personal User", "Core Process Unit"], c: 0 },
                { q: "Quale linguaggio è 'Low Level'?", a: ["Python", "Assembly", "Java"], c: 1 }
            ]},
            { label: "CIVILE", color: "#457b9d", questions: [
                { q: "Il Modulo di Young misura:", a: ["La plasticità", "L'elasticità longitudinale", "La durezza"], c: 1 },
                { q: "Una trave appoggiata-appoggiata è:", a: ["Iperstatica", "Isostatica", "Labile"], c: 1 }
            ]},
            { label: "ELETTRONICO", color: "#f4a261", questions: [
                { q: "La legge di Ohm è:", a: ["V = R/I", "V = R*I", "P = V/I"], c: 1 },
                { q: "Cosa fa un diodo?", a: ["Amplifica", "Permette corrente in un solo senso", "Accumula carica"], c: 1 }
            ]},
            { label: "AEROSPAZIALE", color: "#8338ec", questions: [
                { q: "La portanza dipende da:", a: ["Solo il peso", "Differenza di pressione", "Magnetismo terrestre"], c: 1 },
                { q: "Cosa sono i Mach?", a: ["Unità di potenza", "Rapporto velocità oggetto/suono", "Forza d'attrito"], c: 1 }
            ]}
        ];

        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const spinBtn = document.getElementById('spin-btn');
        const spinSound = document.getElementById('spin-sound');
        
        let currentRotation = 0;

        function draw() {
            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;
            const radius = canvas.width / 2;
            const arc = (2 * Math.PI) / sectors.length;
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            sectors.forEach((s, i) => {
                const angle = i * arc;
                ctx.beginPath();
                ctx.fillStyle = s.color;
                ctx.moveTo(centerX, centerY);
                ctx.arc(centerX, centerY, radius, angle, angle + arc);
                ctx.lineTo(centerX, centerY);
                ctx.fill();
                ctx.save();
                ctx.translate(centerX, centerY);
                ctx.rotate(angle + arc / 2);
                ctx.textAlign = "right";
                ctx.fillStyle = "white";
                ctx.font = "bold 38px Arial";
                ctx.fillText(s.label, radius - 40, 15);
                ctx.restore();
            });
        }

        draw();

        spinBtn.onclick = () => {
            spinBtn.disabled = true;
            
            // Gestione audio sicura
            if (spinSound) {
                spinSound.currentTime = 0;
                spinSound.play().catch(e => console.log("Audio non disponibile ancora"));
            }

            const extraDeg = 3600 + Math.floor(Math.random() * 3600);
            currentRotation += extraDeg;
            canvas.style.transform = `rotate(${currentRotation}deg)`;
            
            setTimeout(() => {
                if (spinSound) spinSound.pause();
                const actualDeg = (currentRotation % 360);
                const idx = Math.floor((360 - actualDeg + 270) % 360 / (360 / sectors.length));
                showQuiz(idx);
            }, 5000);
        };

        function showQuiz(idx) {
            const disc = sectors[idx];
            const qObj = disc.questions[Math.floor(Math.random() * disc.questions.length)];
            const overlay = document.getElementById('quiz-overlay');
            overlay.style.display = 'flex';
            document.getElementById('question-text').innerHTML = `Hai puntato: <b style="color:${disc.color}">${disc.label}</b><br><br>${qObj.q}`;
            const optDiv = document.getElementById('options');
            optDiv.innerHTML = '';
            qObj.a.forEach((ans, i) => {
                const btn = document.createElement('button');
                btn.className = 'ans-btn';
                btn.innerText = ans;
                btn.onclick = () => {
                    alert(i === qObj.c ? "ECCELLENTE! Benvenuto tra noi, Ingegnere." : "BOCCIATO! Torna a studiare.");
                    location.reload();
                };
                optDiv.appendChild(btn);
            });
        }
    </script>
</body>
</html>
