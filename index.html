    <style>
        :root {
            --primary: #00f2ff;
            --secondary: #0062ff;
            --danger: #ff4757;
            --success: #2ed573;
        }

        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background: url('sfondo.jpg') no-repeat center center fixed;
            background-size: cover;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            overflow-x: hidden;
        }

        /* Overlay per contrasto */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, rgba(15, 23, 42, 0.7) 0%, rgba(15, 23, 42, 0.95) 100%);
            z-index: -1;
        }

        .header {
            text-align: center;
            margin-bottom: 20px;
            z-index: 1;
        }

        h1 {
            font-size: 1.8rem;
            text-transform: uppercase;
            letter-spacing: 4px;
            margin: 0;
            background: linear-gradient(to right, var(--primary), #fff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 10px rgba(0, 242, 255, 0.5));
        }

        /* Ruota e Puntatore */
        .wheel-box {
            position: relative;
            width: 85vw;
            max-width: 480px;
            aspect-ratio: 1/1;
            margin-bottom: 30px;
        }

        .wheel-border {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 12px solid #1e293b;
            box-shadow: 0 0 50px rgba(0,0,0,0.8), 0 0 20px var(--primary);
            position: relative;
            overflow: hidden;
            background: #0f172a;
        }

        #canvas {
            width: 100%;
            height: 100%;
            transition: transform 5s cubic-bezier(0.15, 0, 0.15, 1);
        }

        .pointer {
            position: absolute;
            top: -15px;
            left: 50%;
            transform: translateX(-50%);
            width: 0; height: 0;
            border-left: 18px solid transparent;
            border-right: 18px solid transparent;
            border-top: 35px solid var(--danger);
            z-index: 50;
            filter: drop-shadow(0 0 10px var(--danger));
        }

        /* Pulsante */
        #spin-btn {
            padding: 18px 45px;
            font-size: 1.1rem;
            font-weight: 900;
            color: white;
            background: linear-gradient(135deg, var(--secondary), var(--primary));
            border: none;
            border-radius: 12px;
            cursor: pointer;
            text-transform: uppercase;
            box-shadow: 0 10px 20px rgba(0, 98, 255, 0.4);
            transition: 0.3s;
        }

        #spin-btn:hover { transform: translateY(-3px); box-shadow: 0 15px 30px rgba(0, 242, 255, 0.5); }
        #spin-btn:active { transform: translateY(1px); }
        #spin-btn:disabled { filter: grayscale(1); opacity: 0.5; }

        /* Quiz Overlay */
        #quiz-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(10, 15, 30, 0.95);
            backdrop-filter: blur(15px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .quiz-card {
            background: #1e293b;
            padding: 30px;
            border-radius: 20px;
            border: 2px solid var(--primary);
            max-width: 450px;
            width: 100%;
            text-align: center;
            box-shadow: 0 0 40px rgba(0, 242, 255, 0.2);
        }

        .ans-btn {
            display: block;
            width: 100%;
            padding: 16px;
            margin: 12px 0;
            background: rgba(255,255,255,0.05);
            color: white;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            cursor: pointer;
            font-size: 1rem;
            transition: 0.2s;
        }

        .ans-btn:hover { background: var(--primary); color: #000; font-weight: bold; }
    </style>
</head>
