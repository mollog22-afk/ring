<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ingegneria: Il Test Finale</title>
    <style>
        :root {
            --primary: #00d2ff;
            --secondary: #3a7bd5;
            --bg: #0f172a;
            --text: #f8fafc;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: radial-gradient(circle at center, #1e293b 0%, #0f172a 100%);
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        h1 {
            text-transform: uppercase;
            letter-spacing: 3px;
            font-size: 2rem;
            margin-bottom: 10px;
            text-shadow: 0 0 10px rgba(0, 210, 255, 0.5);
        }

        .wheel-outer {
            position: relative;
            padding: 20px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 50%;
            border: 8px solid #334155;
            box-shadow: 0 0 50px rgba(0,0,0,0.5), inset 0 0 20px rgba(0,0,0,0.5);
        }

        .pointer {
            position: absolute;
            top: -20px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 20px solid transparent;
            border-right: 20px solid transparent;
            border-top: 40px solid #ef4444;
            filter: drop-shadow(0 0 10px #ef4444);
            z-index: 100;
        }

        #canvas {
            border-radius: 50%;
            transition: transform 5s cubic-bezier(0.15, 0, 0.15, 1);
        }

        #spin-btn {
            margin-top: 30px;
            padding: 15px 40px;
            font-size: 1.2rem;
            font-weight: bold;
            color: white;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border: none;
            border-radius: 50px;
            cursor: pointer;
            text-transform: uppercase;
            box-shadow: 0 4px 15px rgba(0, 210, 255, 0.3);
            transition: all 0.3s ease;
        }

        #spin-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 25px rgba(0, 210, 255, 0.6);
        }

        #spin-btn:disabled {
            filter: grayscale(1);
            cursor: not-allowed;
        }

        /* Modal Overlay stile Glassmorphism */
        #quiz-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(8px);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .quiz-box {
            background: rgba(255, 255, 255, 0.1);
            padding: 40px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            max-width: 450px;
            width: 90%;
            text-align: center;
        }

        .ans-btn {
            display: block;
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            background: rgba(255, 255, 255, 0.05);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            cursor: pointer;
            font-size: 1rem;
            transition: 0.3s;
        }

        .ans-btn:hover {
            background: var(--primary);
            color: #0f172a;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <h1>Destino Ingegneristico</h1>
    <p style="color: #94a3b8; margin-bottom: 20px;">Gira la ruota e supera l'esame di sbarramento</p>
    
    <div class="wheel-outer">
        <div class="pointer"></div>
        <canvas id="canvas" width="500" height="500"></canvas>
    </div>

    <button id="spin-btn">Avvia Rotazione</button>

    <div id="quiz-overlay">
        <div class="quiz-box">
            <h2 id="quiz-title" style="color: var(--primary);">⚠️ SESSIONE D'ESAME</h2>
            <p id="question-text" style="font-size: 1.2rem; margin: 20px 0;"></p>
            <div id="options"></div>
        </div>
    </div>

    <script>
        const sectors = [
            { label: "MECCANICO", color: "#e63946", q: "In un sistema isolato, l'entropia può diminuire?", a: ["Sì, se il sistema è piccolo", "No, tende sempre ad aumentare", "Solo sotto i 0°C"], correct: 1 },
            { label: "INFORMATICO", color: "#2a9d8f", q: "Qual è la funzione di un puntatore in C++?", a: ["Creare un'animazione", "Puntare all'indirizzo di memoria", "Velocizzare la GPU"], correct: 1 },
            { label: "CIVILE", color: "#457b9d", q: "Qual è la funzione principale delle staffe in una trave?", a: ["Estetica", "Resistere al taglio", "Isolamento termico"], correct: 1 },
            { label: "ELETTRONICO", color: "#f4a261", q: "Cos'è un transistor BJT?", a: ["Un tipo di isolante", "Un interruttore/amplificatore", "Un cavo ad alta tensione"], correct: 1 },
            { label: "AEROSPAZIALE", color: "#8338ec", q: "Cosa stabilisce l'equazione di Bernoulli?", a: ["La conservazione dell'energia nei fluidi", "Il peso di un satellite", "La velocità della luce"], correct: 0 },
            { label: "GESTIONALE", color: "#ffbe0b", q: "In economia, cosa indica il 'Break Even Point'?", a: ["Il punto di pareggio", "Il fallimento aziendale", "Il massimo profitto"], correct: 0 }
        ];

        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const spinBtn = document.getElementById('spin-btn');
        const overlay = document.getElementById('quiz-overlay');
        
        const tot = sectors.length;
        const arc = 2 * Math.PI / tot;
        let currentRotation = 0;

        function drawWheel() {
            sectors.forEach((s, i) => {
                const angle = i * arc;
                
                // Gradiente per ogni spicchio
                let grd = ctx.createRadialGradient(250, 250, 50, 250, 250, 250);
                grd.addColorStop(0, "#1e293b");
                grd.addColorStop(1, s.color);

                ctx.beginPath();
                ctx.fillStyle = grd;
                ctx.moveTo(250, 250);
                ctx.arc(250, 250, 250, angle, angle + arc);
                ctx.fill();
                ctx.strokeStyle = "rgba(255,255,255,0.2)";
                ctx.stroke();

                // Testo
                ctx.save();
                ctx.translate(250, 250);
                ctx.rotate(angle + arc / 2);
                ctx.textAlign = "right";
                ctx.fillStyle = "white";
                ctx.font = "bold 18px Arial";
                ctx.shadowBlur = 5;
                ctx.shadowColor = "black";
                ctx.fillText(s.label, 230, 10);
                ctx.restore();
            });
        }

        drawWheel();

        spinBtn.onclick = () => {
            spinBtn.disabled = true;
            const deg = 3600 + Math.floor(Math.random() * 3600);
            currentRotation += deg;
            canvas.style.transform = `rotate(${currentRotation}deg)`;
            
            setTimeout(() => {
                const actualDeg = (currentRotation % 360);
                const idx = Math.floor((360 - actualDeg + 270) % 360 / (360/tot));
                showQuiz(idx);
            }, 5200);
        };

        function showQuiz(idx) {
            const s = sectors[idx];
            overlay.style.display = 'flex';
            document.getElementById('question-text').innerHTML = `<span style="color: #94a3b8">Destino:</span> ${s.label}<br><br>${s.q}`;
            
            const optDiv = document.getElementById('options');
            optDiv.innerHTML = '';
            
            s.a.forEach((ans, i) => {
                const btn = document.createElement('button');
                btn.className = 'ans-btn';
                btn.innerText = ans;
                btn.onclick = () => {
                    if(i === s.correct) {
                        alert(`Dottore! Dottore! Complimenti Ingegnere ${s.label}! 🎉`);
                    } else {
                        alert("ERRORE GRAVE. La commissione ti ha bocciato. Torna a studiare!");
                    }
                    location.reload();
                };
                optDiv.appendChild(btn);
            });
        }
    </script>
</body>
</html>
