<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ingegneria Wheel</title>
    <style>
        :root {
            --primary: #00f2ff;
            --secondary: #0062ff;
            --bg: #0f172a;
        }

        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background: #0f172a url('sfondo.jpg') no-repeat center center fixed;
            background-size: cover;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        /* Overlay per il contrasto */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.85);
            z-index: -1;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        h1 {
            font-size: 2.2rem;
            text-transform: uppercase;
            letter-spacing: 4px;
            margin: 0;
            color: var(--primary);
            text-shadow: 0 0 15px rgba(0, 242, 255, 0.7);
        }

        p {
            font-size: 1.1rem;
            color: #94a3b8;
            margin-top: 5px;
        }

        .wheel-container {
            position: relative;
            width: 85vw;
            max-width: 500px;
            aspect-ratio: 1/1;
        }

        /* La corona retroilluminata */
        .neon-glow {
            position: absolute;
            top: -10px; left: -10px; right: -10px; bottom: -10px;
            border-radius: 50%;
            border: 4px solid var(--primary);
            box-shadow: 0 0 30px var(--primary), inset 0 0 20px var(--primary);
            z-index: 1;
            pointer-events: none;
        }

        #canvas {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            position: relative;
            z-index: 2;
            transition: transform 5s cubic-bezier(0.15, 0, 0.15, 1);
        }

        .pointer {
            position: absolute;
            top: -25px;
            left: 50%;
            transform: translateX(-50%);
            width: 0; height: 0;
            border-left: 20px solid transparent;
            border-right: 20px solid transparent;
            border-top: 40px solid #ff4757;
            z-index: 100;
            filter: drop-shadow(0 0 10px #ff4757);
        }

        #spin-btn {
            margin-top: 40px;
            padding: 15px 45px;
            font-size: 1.2rem;
            font-weight: 900;
            color: white;
            background: linear-gradient(135deg, var(--secondary), var(--primary));
            border: none;
            border-radius: 10px;
            cursor: pointer;
            text-transform: uppercase;
            box-shadow: 0 10px 25px rgba(0, 98, 255, 0.4);
            transition: 0.3s;
            z-index: 5;
        }

        #spin-btn:hover { transform: scale(1.05); box-shadow: 0 0 30px var(--primary); }

        /* Modal Quiz */
        #quiz-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(10, 15, 30, 0.98);
            z-index: 2000;
            justify-content: center; align-items: center;
        }

        .quiz-card {
            background: #1e293b;
            padding: 30px;
            border-radius: 20px;
            border: 2px solid var(--primary);
            max-width: 400px; width: 90%;
            text-align: center;
        }

        .ans-btn {
            display: block; width: 100%; padding: 15px;
            margin: 10px 0; background: rgba(255,255,255,0.05);
            color: white; border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px; cursor: pointer; font-size: 1rem;
        }

        .ans-btn:hover { background: var(--primary); color: #000; font-weight: bold; }
    </style>
</head>
<body>

    <div class="header">
        <h1>Ingegneria Wheel</h1>
        <p>supera l'esame o torna a studiare!</p>
    </div>
    
    <div class="wheel-container">
        <div class="pointer"></div>
        <div class="neon-glow"></div>
        <canvas id="canvas" width="600" height="600"></canvas>
    </div>

    <button id="spin-btn">Avvia Protocollo</button>

    <div id="quiz-overlay">
        <div class="quiz-card">
            <h2 id="quiz-title" style="color: var(--primary);">SESSIONE D'ESAME</h2>
