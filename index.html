<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ingegneria: Il Test Finale</title>
    <style>
        :root {
            --primary: #00d2ff;
            --bg: #0f172a;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: url('sfondo.jpg') no-repeat center center fixed;
            background-size: cover;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 10px;
            box-sizing: border-box;
        }

        /* Overlay scuro per rendere leggibile il testo sullo sfondo */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.85);
            z-index: -1;
        }

        h1 {
            font-size: 1.5rem;
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 5px;
            color: var(--primary);
        }

        .wheel-container {
            position: relative;
            width: 90vw; /* Adattabile allo schermo */
            max-width: 450px;
            aspect-ratio: 1 / 1;
            margin: 20px auto;
        }

        #canvas {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 5px solid #334155;
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
            transition: transform 5s cubic-bezier(0.15, 0, 0.15, 1);
        }

        .pointer {
            position: absolute;
            top: -15px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 15px solid transparent;
            border-right: 15px solid transparent;
            border-top: 30px solid #ef4444;
            z-index: 10;
        }

        #spin-btn {
            padding: 15px 35px;
            font-size: 1rem;
            font-weight: bold;
            color: white;
            background: linear-gradient(135deg, #00d2ff, #3a7bd5);
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0, 210, 255, 0.4);
        }

        /* Quiz Modal */
        #quiz-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(10px);
            justify-content: center;
            align-items: center;
            z-index: 1000;
            padding: 20px;
        }

        .quiz-box {
            background: #1e293b;
            padding: 25px;
            border-radius: 15px;
            border: 1px solid var(--primary);
            max-width: 400px;
            width: 100%;
            text-align: center;
        }

        .ans-btn {
            display: block;
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            background: rgba(255,255,255,0.05);
            color: white;
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 8px;
            cursor: pointer;
        }

        .ans-btn:active { background: var(--primary); }

        @media (max-width: 480px) {
            h1 { font-size: 1.2rem; }
            #spin-btn { width: 80%; }
        }
    </style>
</head>
<body>

    <h1>Test Finale Ingegneria</h1>
    
    <div class="wheel-container">
        <div class="pointer"></div>
        <canvas id="canvas" width="500" height="500"></canvas>
    </div>

    <button id="spin-btn">GIRA LA RUOTA</button>

    <div id="quiz-overlay">
        <div class="quiz-box">
            <h2 id="quiz-title">⚠️ DOMANDA D'ESAME</h2>
            <p id="question-text"></p>
            <div id="options"></div>
        </div>
    </div>

    <script>
        const database = [
            { 
                label: "MECCANICO", color: "#e63946", 
                questions: [
                    { q: "Cos'è il numero di Reynolds?", a: ["Rapporto tra forze d'inerzia e viscose", "La velocità del suono", "Un indice di durezza"], c: 0 },
                    { q: "Qual è la funzione del volano?", a: ["Raffreddare il motore", "Regolarizzare il moto rotatorio", "Aumentare la compressione"], c: 1 }
                ]
            },
            { 
                label: "INFORMATICO", color: "#2a9d8f", 
                questions: [
                    { q: "Qual è il protocollo principale del Web?", a: ["FTP", "HTTP", "SMTP"], c: 1 },
                    { q: "Cosa fa un compilatore?", a: ["Esegue il codice riga per riga", "Traduce codice sorgente in binario", "Pulisce i virus"], c: 1 }
                ]
            },
            { 
                label: "CIVILE", color: "#457b9d", 
                questions: [
                    { q: "Cosa indica il limite di snervamento?", a: ["Inizio deformazione plastica", "Rottura immediata", "Punto di fusione"], c: 0 },
                    { q: "In idraulica, cos'è una paratoia?", a: ["Un tipo di mattone", "Uno sbarramento mobile", "Un pilastro"], c: 1 }
                ]
            },
            { 
                label: "ELETTRONICO", color: "#f4a261", 
                questions: [
                    { q: "Qual è l'unità di misura della capacità?", a: ["Ohm", "Farad", "Henry"], c: 1 },
                    { q: "Cosa fa un raddrizzatore?", a: ["Trasforma AC in DC", "Aumenta la tensione", "Misura la corrente"], c: 0 }
                ]
            },
            { 
                label: "AEROSPAZIALE", color: "#8338ec", 
                questions: [
                    { q: "Cosa genera la portanza?", a: ["Il peso dell'aria", "Differenza di pressione sulle ali", "Il motore posteriore"], c: 1 },
                    { q: "Cos'è Mach 1?", a: ["La velocità della luce", "La velocità del suono", "La forza di gravità"], c: 1 }
                ]
            }
        ];

        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const spinBtn = document.getElementById('spin-btn');
        const overlay = document.getElementById('quiz-overlay');
        
        const tot = database.length;
        const arc = 2 * Math.PI / tot;
        let currentRotation = 0;

        function drawWheel() {
            database.forEach((s, i) => {
                const angle = i * arc;
                ctx.beginPath();
                ctx.fillStyle = s.color;
                ctx.moveTo(250, 250);
                ctx.arc(250, 250, 250, angle, angle + arc);
                ctx.fill();
                ctx.save();
                ctx.translate(250, 250);
                ctx.rotate(angle + arc / 2);
                ctx.textAlign = "right";
                ctx.fillStyle = "white";
                ctx.font = "bold 22px Arial";
                ctx.fillText(s.label, 230, 10);
                ctx.restore();
            });
        }

        drawWheel();

        spinBtn.onclick = () => {
            spinBtn.disabled = true;
            const extraDeg = 3600 + Math.floor(Math.random() * 3600);
            currentRotation += extraDeg;
            canvas.style.transform = `rotate(${currentRotation}deg)`;
            
            setTimeout(() => {
                const actualDeg = (currentRotation % 360);
                const idx = Math.floor((360 - actualDeg + 270) % 360 / (360/tot));
                showQuiz(idx);
            }, 5000);
        };

        function showQuiz(idx) {
            const discipline = database[idx];
            const question = discipline.questions[Math.floor(Math.random() * discipline.questions.length)];
            
            overlay.style.display = 'flex';
            document.getElementById('question-text').innerText = `Per essere un Ingegnere ${discipline.label}: ${question.q}`;
            
            const optDiv = document.getElementById('options');
            optDiv.innerHTML = '';
            
            question.a.forEach((ans, i) => {
                const btn = document.createElement('button');
                btn.className = 'ans-btn';
                btn.innerText = ans;
                btn.onclick = () => {
                    if(i === question.c) {
                        alert(`Congratulazioni! Sei ufficialmente un Ingegnere ${discipline.label}! 🎉`);
                    } else {
                        alert("ERRORE! La commissione ti boccia. Torna a studiare!");
                    }
                    location.reload();
                };
                optDiv.appendChild(btn);
            });
        }
    </script>
</body>
</html>
